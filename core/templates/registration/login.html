{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUSEN - Iniciar Sesión</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body class="auth-wrapper">

    <div class="card auth-card p-4 p-md-5">
        <div class="card-body text-center">

            <div class="mb-4">
                <span class="brand-logo-auth">🍃</span>
                <span class="brand-name-auth text-dark">Ausen</span>
                <span class="brand-slogan-auth text-secondary">Gestión de Vacaciones & Licencias</span>
            </div>

            <h5 class="text-muted mb-4 fw-normal small">Bienvenido/a</h5>

            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger py-2 small mb-3 border-0 bg-danger bg-opacity-10 text-danger rounded-3 fw-bold">
                        ❌ Usuario o contraseña incorrectos.
                    </div>
                {% endif %}

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold text-secondary small" style="font-size: 0.75rem;">USUARIO</label>
                    <input type="text" name="username" class="form-control border-0 shadow-sm bg-body-tertiary p-3" placeholder="Usuario" required autofocus>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label fw-bold text-secondary small" style="font-size: 0.75rem;">CONTRASEÑA</label>
                    <input type="password" name="password" class="form-control border-0 shadow-sm bg-body-tertiary p-3" placeholder="••••••••" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-dark rounded-pill shadow-sm py-2 fw-bold" style="letter-spacing: 1px;">
                        INGRESAR
                    </button>
                </div>

                <div class="text-center mt-4">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none small text-secondary fw-bold">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>
            </form>

            <div class="mt-4 pt-3 border-top">
                <small class="text-muted d-block" style="font-size: 0.8rem;">
                    &copy; {% now "Y" %} <strong>AUSEN</strong>.
                </small>
                <small class="text-secondary opacity-75" style="font-size: 0.7rem;">
                    Designed & Developed by <strong>Emanuel Sequeira</strong>
                </small>
            </div>
        </div>
    </div>

</body>
</html>
