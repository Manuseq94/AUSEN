{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Listo! | AUSEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body class="auth-wrapper">

    <div class="card auth-card p-4 p-md-5">
        <div class="card-body text-center">
            <div class="mb-3">
                <span style="font-size: 4rem;">✅</span>
            </div>

            <h3 class="fw-bold mb-3 text-dark">¡Contraseña Cambiada!</h3>

            <p class="text-muted mb-4">
                Tu clave ha sido actualizada correctamente. <br>
                Ya puedes ingresar al sistema.
            </p>

            <div class="d-grid">
                <a href="/accounts/login/" class="btn btn-dark rounded-pill shadow-sm py-2 fw-bold" style="letter-spacing: 1px;">
                    INICIAR SESIÓN
                </a>
            </div>

            <div class="mt-4 pt-3 border-top">
                <small class="text-secondary opacity-75" style="font-size: 0.7rem;">
                    Designed by <strong>Emanuel Sequeira</strong>
                </small>
            </div>
        </div>
    </div>

</body>
</html>
