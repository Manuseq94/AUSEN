<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Saldo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-danger">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">⚠️ Confirmar Eliminación</h5>
                    </div>
                    <div class="card-body text-center">
                        <p class="fs-5">Estás a punto de eliminar el saldo del año:</p>
                        <h2 class="fw-bold">{{ bolsa.anio }}</h2>
                        <p class="text-muted">Cantidad actual: {{ bolsa.dias_restantes }} días</p>

                        <div class="alert alert-warning small">
                            Esta acción no se puede deshacer. Si el empleado ya usó días de este año, podría generar inconsistencias en el historial.
                        </div>

                        <form method="post">
                            {% csrf_token %}
                            <div class="d-flex justify-content-center gap-2 mt-4">
                                <a href="{% url 'detalle_empleado' bolsa.empleado.id %}" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
