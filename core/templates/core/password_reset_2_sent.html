<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado | AUSEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1948&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            margin: 20px;
        }
        .btn-primary { background-color: #333; border-color: #333; padding: 10px; font-weight: bold; letter-spacing: 1px; transition: all 0.3s; }
        .btn-primary:hover { background-color: #555; border-color: #555; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="card login-card p-4 p-md-5">
        <div class="card-body text-center">
            <div class="mb-3">
                <span style="font-size: 4rem;">📨</span>
            </div>

            <h4 class="fw-bold mb-3 text-dark">¡Correo Enviado!</h4>

            <p class="text-muted mb-4">
                Hemos enviado las instrucciones a tu correo electrónico. <br>
                <span class="small text-danger">Revisa también tu carpeta de SPAM.</span>
            </p>

            <div class="d-grid">
                <a href="/accounts/login/" class="btn btn-primary rounded-pill shadow-sm">
                    VOLVER AL LOGIN
                </a>
            </div>

            <div class="mt-4 pt-3 border-top">
                <small class="text-secondary opacity-75" style="font-size: 0.7rem;">
                    Designed by <strong>Emanuel Sequeira</strong>
                </small>
            </div>
        </div>
    </div>

</body>
</html>
