{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | AUSEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body class="auth-wrapper">

    <div class="card auth-card p-4 p-md-5">
        <div class="card-body text-center">

            <div class="mb-4">
                <span class="brand-logo-auth">🆕</span>
                <span class="brand-name-auth text-dark">Nueva Clave</span>
            </div>

            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold text-secondary small text-uppercase" style="font-size: 0.75rem;">{{ field.label }}</label>

                    <input type="{{ field.field.widget.input_type }}"
                           name="{{ field.html_name }}"
                           class="form-control border-0 shadow-sm bg-body-tertiary p-3"
                           {% if field.field.required %}required{% endif %}>

                    {% if field.help_text %}
                        <div class="form-text small opacity-75" style="font-size: 0.7rem;">{{ field.help_text }}</div>
                    {% endif %}

                    {% for error in field.errors %}
                        <div class="text-danger small mt-1 fw-bold">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success rounded-pill shadow-sm py-2 fw-bold" style="letter-spacing: 1px;">
                        CONFIRMAR CAMBIO
                    </button>
                </div>
            </form>

            <div class="mt-4 pt-3 border-top">
                <small class="text-muted" style="font-size: 0.7rem;"><strong>AUSEN</strong> System</small>
            </div>
        </div>
    </div>

</body>
</html>
