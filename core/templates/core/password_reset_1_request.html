{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | AUSEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body class="auth-wrapper">

    <div class="card auth-card p-4 p-md-5">
        <div class="card-body text-center">

            <div class="mb-4">
                <span class="brand-logo-auth">🔐</span> 
                <span class="brand-name-auth text-dark">Recuperar</span>
                <span class="brand-slogan-auth text-secondary">Restablecer Contraseña</span>
            </div>

            <p class="text-muted small mb-4">
                Ingresa tu correo electrónico y te enviaremos un enlace para generar una nueva clave.
            </p>

            <form method="post">
                {% csrf_token %}

                <div class="mb-4 text-start">
                    <label class="form-label fw-bold text-secondary small" style="font-size: 0.75rem;">CORREO ELECTRÓNICO</label>
                    <input type="email" name="email" class="form-control border-0 shadow-sm bg-body-tertiary p-3" placeholder="ejemplo@cooperativa.com" required autofocus>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-dark rounded-pill shadow-sm py-2 fw-bold" style="letter-spacing: 1px;">
                        ENVIAR ENLACE
                    </button>
                    <a href="{% url 'home_redirect' %}" class="btn btn-outline-secondary rounded-pill border-0 btn-sm mt-2 fw-bold">
                        Cancelar y Volver
                    </a>
                </div>
            </form>

            <div class="mt-4 pt-3 border-top">
                <small class="text-secondary opacity-75" style="font-size: 0.7rem;">
                    <strong>AUSEN</strong> Security System
                </small>
            </div>
        </div>
    </div>

</body>
</html>
