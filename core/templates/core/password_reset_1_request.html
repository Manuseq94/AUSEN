<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | AUSEN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1948&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            margin: 20px;
        }
        .brand-logo { font-size: 3rem; margin-bottom: 0.5rem; display: block; text-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .brand-name { font-family: 'Segoe UI', sans-serif; letter-spacing: 4px; font-weight: 300; font-size: 1.8rem; color: #333; margin-bottom: 0.2rem; display: block; text-transform: uppercase; }
        .brand-slogan { font-size: 0.7rem; letter-spacing: 1.5px; color: #6c757d; font-weight: 600; text-transform: uppercase; margin-bottom: 2rem; display: block; }
        .btn-primary { background-color: #333; border-color: #333; padding: 10px; font-weight: bold; letter-spacing: 1px; transition: all 0.3s; }
        .btn-primary:hover { background-color: #555; border-color: #555; transform: translateY(-2px); }
        .form-control { padding: 12px; background-color: #f8f9fa; }
        .form-control:focus { border-color: #28a745; box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.25); background-color: #fff; }
    </style>
</head>
<body>

    <div class="card login-card p-4 p-md-5">
        <div class="card-body text-center">

            <div class="mb-4">
                <span class="brand-logo">🔐</span> <span class="brand-name">Recuperar</span>
                <span class="brand-slogan">Restablecer Contraseña</span>
            </div>

            <p class="text-muted small mb-4">
                Ingresa tu correo electrónico y te enviaremos un enlace para generar una nueva clave.
            </p>

            <form method="post">
                {% csrf_token %}

                <div class="mb-4 text-start">
                    <label class="form-label fw-bold text-secondary small" style="font-size: 0.75rem;">CORREO ELECTRÓNICO</label>
                    <input type="email" name="email" class="form-control border-0 shadow-sm" placeholder="ejemplo@cooperativa.com" required autofocus>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill shadow-sm">
                        ENVIAR ENLACE
                    </button>
                    <a href="{% url 'home_redirect' %}" class="btn btn-outline-secondary rounded-pill border-0 btn-sm mt-2">
                        Cancelar y Volver
                    </a>
                </div>
            </form>

            <div class="mt-4 pt-3 border-top">
                <small class="text-secondary opacity-75" style="font-size: 0.7rem;">
                    <strong>AUSEN</strong> Security System
                </small>
            </div>
        </div>
    </div>

</body>
</html>
