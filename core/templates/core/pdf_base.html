<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Documento AUSEN{% endblock %}</title>

    <style>
        /* Configuración de la hoja y el pie de página para xhtml2pdf */
        @page {
            size: A4;
            margin: 2cm 2cm 2.5cm 2cm;
            @frame footer_frame {
                -pdf-frame-content: footer_content;
                left: 2cm; right: 2cm; bottom: 1cm; height: 1cm;
            }
        }

        body {
            font-family: Helvetica, sans-serif;
            font-size: 10pt;
            line-height: 1.5;
            color: #334155; /* slate-700 */
        }

        /* Cabecera Limpia */
        .header { margin-bottom: 25px; }
        .header h1 { margin: 0 0 5px 0; color: #0f172a; font-size: 18pt; font-weight: normal; }
        .header h4 { margin: 0; font-size: 9pt; color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-weight: normal;}
        .header-line { border-bottom: 1px solid #e2e8f0; margin-top: 15px; }

        /* Cajas de Información Generales */
        .info-box {
            background-color: #f8fafc;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .info-table { width: 100%; }
        .info-table td { padding: 4px 5px; vertical-align: top; }
        
        /* Tipografía de datos */
        .label { font-weight: bold; color: #64748b; font-size: 8pt; text-transform: uppercase; }
        .value { font-weight: bold; color: #0f172a; font-size: 10pt; display: block; margin-top: 2px; }
        .value-highlight { color: #0284c7; font-size: 11pt; font-weight: bold; display: block; margin-top: 2px; }

        /* Textos y Párrafos */
        .content-text { text-align: justify; margin-bottom: 15px; font-size: 10.5pt; }
        
        /* Alertas y Estados (Badges) */
        .alert-danger { background-color: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 12px; border-radius: 4px; font-size: 9pt; font-weight: bold; }
        .observaciones-box { background-color: #ffffff; border: 1px solid #e2e8f0; padding: 10px; font-style: italic; color: #475569; margin-top: 5px; }
        
        .badge-success { color: #166534; border: 1px solid #166534; padding: 4px 8px; font-weight: bold; font-size: 8pt; border-radius: 3px; }
        .badge-warning { color: #9a3412; border: 1px solid #9a3412; padding: 4px 8px; font-weight: bold; font-size: 8pt; border-radius: 3px; }

        /* Sistema unificado de Firmas */
        .firmas-table { width: 100%; margin-top: 60px; }
        .firmas-table td { width: 50%; text-align: center; vertical-align: bottom; }
        .firma-line { border-top: 1px solid #94a3b8; width: 70%; margin: 0 auto 5px auto; padding-top: 5px; }
        .firma-name { font-weight: bold; color: #0f172a; font-size: 9pt; }
        .firma-role { font-size: 8pt; color: #64748b; }

        /* Footer anclado abajo */
        #footer_content { text-align: left; font-size: 8pt; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>{% block header_title %}AUSEN{% endblock %}</h1>
        <h4>{% block header_subtitle %}Recursos Humanos{% endblock %}</h4>
        <div class="header-line"></div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <div id="footer_content">
        AUSEN &middot; Comprobante Interno &middot; Generado el {{ hoy|date:"d/m/Y H:i" }}
    </div>

</body>
</html>
